<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Memory Match</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .container { text-align: center; }
    h1 { color: #fff; margin-bottom: 20px; font-size: 42px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .stats { color: #fff; font-size: 20px; margin-bottom: 20px; }
    .grid { 
      display: grid; 
      grid-template-columns: repeat(4, 80px); 
      gap: 10px; 
      justify-content: center;
      margin-bottom: 20px;
    }
    .card { 
      width: 80px; 
      height: 80px; 
      background: rgba(255,255,255,0.9); 
      border-radius: 10px;
      font-size: 40px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s;
    }
    .card:hover { transform: scale(1.05); }
    .card.flipped, .card.matched { background: #fff; }
    .card.matched { opacity: 0.5; cursor: default; }
    .btn { 
      padding: 12px 30px; 
      font-size: 18px; 
      background: #fff; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 Memory Match</h1>
    <div class="stats">Moves: <span id="moves">0</span> | Pairs: <span id="pairs">0</span>/8</div>
    <div class="grid" id="grid"></div>
    <button class="btn" onclick="init()">New Game</button>
  </div>
  <script>
    const emojis = ['🎮', '🎯', '🎲', '🎪', '🎨', '🎭', '🎪', '🎸'];
    let cards, flipped, matched, moves, locked;
    
    function init() {
      cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
      flipped = [];
      matched = [];
      moves = 0;
      locked = false;
      document.getElementById('moves').textContent = 0;
      document.getElementById('pairs').textContent = 0;
      render();
    }
    
    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = cards.map((c, i) => 
        `<div class="card ${matched.includes(i) ? 'matched' : ''} ${flipped.includes(i) ? 'flipped' : ''}" 
         onclick="flip(${i})">${flipped.includes(i) || matched.includes(i) ? c : '❓'}</div>`
      ).join('');
    }
    
    function flip(i) {
      if (locked || flipped.includes(i) || matched.includes(i)) return;
      
      flipped.push(i);
      render();
      
      if (flipped.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        locked = true;
        
        setTimeout(() => {
          if (cards[flipped[0]] === cards[flipped[1]]) {
            matched.push(...flipped);
            document.getElementById('pairs').textContent = matched.length / 2;
            if (matched.length === 16) alert('🎉 You Won in ' + moves + ' moves!');
          }
          flipped = [];
          locked = false;
          render();
        }, 800);
      }
    }
    
    init();
  </script>
</body>
</html>
