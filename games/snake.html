<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .container { text-align: center; }
    h1 { color: #fff; margin-bottom: 20px; font-size: 48px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .score { color: #fff; font-size: 24px; margin-bottom: 15px; }
    canvas { 
      background: rgba(0,0,0,0.3); 
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .btn { 
      margin-top: 20px; 
      padding: 12px 30px; 
      font-size: 18px; 
      background: #fff; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer;
    }
    .instructions { color: #fff; margin-top: 15px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐍 Snake</h1>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="game" width="400" height="400"></canvas>
    <br>
    <button class="btn" onclick="reset()">New Game</button>
    <p class="instructions">Use arrow keys to move</p>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const gridSize = 20;
    const gridCount = canvas.width / gridSize;
    
    let snake, food, dir, nextDir, score, gameLoop;
    
    function reset() {
      snake = [{x: 5, y: 5}];
      dir = 'right';
      nextDir = 'right';
      score = 0;
      placeFood();
      document.getElementById('score').textContent = 0;
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, 100);
    }
    
    function placeFood() {
      do { food = {x: Math.floor(Math.random() * gridCount), y: Math.floor(Math.random() * gridCount)}; }
      while (snake.some(s => s.x === food.x && s.y === food.y));
    }
    
    function update() {
      dir = nextDir;
      const head = {...snake[0]};
      
      if (dir === 'up') head.y--;
      if (dir === 'down') head.y++;
      if (dir === 'left') head.x--;
      if (dir === 'right') head.x++;
      
      if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount ||
          snake.some(s => s.x === head.x && s.y === head.y)) {
        clearInterval(gameLoop);
        alert('Game Over! Score: ' + score);
        return;
      }
      
      snake.unshift(head);
      
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        placeFood();
      } else {
        snake.pop();
      }
      
      draw();
    }
    
    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#2ecc71';
      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#27ae60' : '#2ecc71';
        ctx.fillRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2);
      });
      
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
      ctx.fill();
    }
    
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' && dir !== 'down') nextDir = 'up';
      if (e.key === 'ArrowDown' && dir !== 'up') nextDir = 'down';
      if (e.key === 'ArrowLeft' && dir !== 'right') nextDir = 'left';
      if (e.key === 'ArrowRight' && dir !== 'left') nextDir = 'right';
    });
    
    reset();
  </script>
</body>
</html>
