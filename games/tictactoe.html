<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .container { text-align: center; }
    h1 { color: #fff; margin-bottom: 20px; font-size: 48px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .status { color: #fff; font-size: 24px; margin-bottom: 20px; }
    .board { 
      display: grid; 
      grid-template-columns: repeat(3, 100px); 
      gap: 10px; 
      justify-content: center;
      margin-bottom: 20px;
    }
    .cell { 
      width: 100px; 
      height: 100px; 
      background: rgba(255,255,255,0.9); 
      border-radius: 10px;
      font-size: 60px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s;
      color: #333;
    }
    .cell:hover { transform: scale(1.05); background: #fff; }
    .cell.x { color: #e74c3c; }
    .cell.o { color: #3498db; }
    .btn { 
      padding: 12px 30px; 
      font-size: 18px; 
      background: #fff; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⭕ Tic Tac Toe ❌</h1>
    <div class="status" id="status">Your turn (X)</div>
    <div class="board" id="board"></div>
    <button class="btn" onclick="init()">New Game</button>
  </div>
  <script>
    let board, turn, gameOver;
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    
    function init() {
      board = Array(9).fill('');
      turn = 'X';
      gameOver = false;
      document.getElementById('status').textContent = 'Your turn (X)';
      render();
    }
    
    function render() {
      const container = document.getElementById('board');
      container.innerHTML = board.map((v, i) => 
        `<div class="cell ${v.toLowerCase()}" onclick="move(${i})">${v}</div>`
      ).join('');
    }
    
    function move(i) {
      if (board[i] || gameOver || turn !== 'X') return;
      board[i] = 'X';
      if (checkWin('X')) { end('You win! 🎉'); return; }
      if (board.every(c => c)) { end("It's a draw!"); return; }
      turn = 'O';
      document.getElementById('status').textContent = 'Computer thinking...';
      render();
      setTimeout(computerMove, 500);
    }
    
    function computerMove() {
      if (gameOver) return;
      
      // Try to win
      for (let w of wins) {
        const vals = w.map(i => board[i]);
        if (vals.filter(v => v === 'O').length === 2 && vals.includes('')) {
          board[w[vals.indexOf('')]] = 'O';
          if (checkWin('O')) { end('Computer wins! 🤖'); return; }
          turn = 'X';
          document.getElementById('status').textContent = 'Your turn (X)';
          render();
          return;
        }
      }
      
      // Block player
      for (let w of wins) {
        const vals = w.map(i => board[i]);
        if (vals.filter(v => v === 'X').length === 2 && vals.includes('')) {
          board[w[vals.indexOf('')]] = 'O';
          turn = 'X';
          document.getElementById('status').textContent = 'Your turn (X)';
          render();
          return;
        }
      }
      
      // Random move
      const empty = board.map((v, i) => v ? -1 : i).filter(i => i >= 0);
      if (empty.length) {
        board[empty[Math.floor(Math.random() * empty.length)]] = 'O';
        turn = 'X';
        document.getElementById('status').textContent = 'Your turn (X)';
        render();
      }
    }
    
    function checkWin(p) {
      return wins.some(w => w.every(i => board[i] === p));
    }
    
    function end(msg) {
      gameOver = true;
      document.getElementById('status').textContent = msg;
      render();
    }
    
    init();
  </script>
</body>
</html>
