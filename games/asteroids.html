<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0a; 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .container { text-align: center; }
    h1 { color: #fff; margin-bottom: 20px; font-size: 48px; }
    .score { color: #fff; font-size: 24px; margin-bottom: 15px; }
    canvas { 
      background: #0a0a0a; 
      border-radius: 10px;
      box-shadow: 0 0 50px rgba(100, 200, 255, 0.2);
    }
    .btn { 
      margin-top: 20px; 
      padding: 12px 30px; 
      font-size: 18px; 
      background: #3498db; 
      color: #fff;
      border: none; 
      border-radius: 8px; 
      cursor: pointer;
    }
    .instructions { color: #888; margin-top: 15px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>☄️ Asteroids</h1>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="game" width="600" height="500"></canvas>
    <br>
    <button class="btn" onclick="reset()">New Game</button>
    <p class="instructions">← → to rotate | ↑ to thrust | Space to shoot</p>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    let ship, asteroids, bullets, score, gameOver, gameLoop;
    
    function reset() {
      ship = { x: canvas.width/2, y: canvas.height/2, r: 15, angle: -Math.PI/2, vx: 0, vy: 0 };
      asteroids = [];
      bullets = [];
      score = 0;
      gameOver = false;
      document.getElementById('score').textContent = 0;
      
      for (let i = 0; i < 5; i++) spawnAsteroid();
      
      if (gameLoop) cancelAnimationFrame(gameLoop);
      game();
    }
    
    function spawnAsteroid(x, y, size = 50) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 2;
      asteroids.push({
        x: x !== undefined ? x : Math.random() * canvas.width,
        y: y !== undefined ? y : Math.random() * canvas.height,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: size,
        vertices: [...Array(8)].map(() => 0.7 + Math.random() * 0.6)
      });
    }
    
    const keys = {};
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);
    
    let canShoot = true;
    function game() {
      // Controls
      if (keys['ArrowLeft']) ship.angle -= 0.07;
      if (keys['ArrowRight']) ship.angle += 0.07;
      if (keys['ArrowUp']) {
        ship.vx += Math.cos(ship.angle) * 0.1;
        ship.vy += Math.sin(ship.angle) * 0.1;
      }
      if (keys['Space'] && canShoot) {
        bullets.push({
          x: ship.x + Math.cos(ship.angle) * ship.r,
          y: ship.y + Math.sin(ship.angle) * ship.r,
          vx: Math.cos(ship.angle) * 8,
          vy: Math.sin(ship.angle) * 8,
          life: 60
        });
        canShoot = false;
        setTimeout(() => canShoot = true, 200);
      }
      
      // Ship movement
      ship.x += ship.vx;
      ship.y += ship.vy;
      ship.vx *= 0.99;
      ship.vy *= 0.99;
      
      // Wrap around
      if (ship.x < 0) ship.x = canvas.width;
      if (ship.x > canvas.width) ship.x = 0;
      if (ship.y < 0) ship.y = canvas.height;
      if (ship.y > canvas.height) ship.y = 0;
      
      // Bullets
      bullets.forEach(b => { b.x += b.vx; b.y += b.vy; b.life--; });
      bullets = bullets.filter(b => b.life > 0);
      
      // Asteroids
      asteroids.forEach(a => {
        a.x += a.vx;
        a.y += a.vy;
        if (a.x < -a.r) a.x = canvas.width + a.r;
        if (a.x > canvas.width + a.r) a.x = -a.r;
        if (a.y < -a.r) a.y = canvas.height + a.r;
        if (a.y > canvas.height + a.r) a.y = -a.r;
      });
      
      // Collision: bullet vs asteroid
      bullets.forEach((b, bi) => {
        asteroids.forEach((a, ai) => {
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          if (Math.sqrt(dx*dx + dy*dy) < a.r) {
            bullets.splice(bi, 1);
            if (a.r > 20) {
              spawnAsteroid(a.x, a.y, a.r / 2);
              spawnAsteroid(a.x, a.y, a.r / 2);
            }
            asteroids.splice(ai, 1);
            score += Math.floor(100 / a.r * 10);
            document.getElementById('score').textContent = score;
          }
        });
      });
      
      // Collision: ship vs asteroid
      asteroids.forEach(a => {
        const dx = ship.x - a.x;
        const dy = ship.y - a.y;
        if (Math.sqrt(dx*dx + dy*dy) < ship.r + a.r - 5) {
          gameOver = true;
          setTimeout(() => alert('Game Over! Score: ' + score), 100);
        }
      });
      
      // Draw
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Stars
      ctx.fillStyle = '#333';
      for (let i = 0; i < 50; i++) {
        ctx.fillRect((i * 127) % canvas.width, (i * 311) % canvas.height, 1, 1);
      }
      
      // Asteroids
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      asteroids.forEach(a => {
        ctx.beginPath();
        a.vertices.forEach((v, i) => {
          const angle = (i / a.vertices.length) * Math.PI * 2;
          const x = a.x + Math.cos(angle) * a.r * v;
          const y = a.y + Math.sin(angle) * a.r * v;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.stroke();
      });
      
      // Bullets
      ctx.fillStyle = '#fff';
      bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      
      // Ship
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle + Math.PI/2);
      ctx.beginPath();
      ctx.moveTo(0, -ship.r);
      ctx.lineTo(-ship.r, ship.r);
      ctx.lineTo(ship.r, ship.r);
      ctx.closePath();
      ctx.strokeStyle = '#64c8ff';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Thrust
      if (keys['ArrowUp']) {
        ctx.fillStyle = '#f39c12';
        ctx.beginPath();
        ctx.moveTo(-8, ship.r);
        ctx.lineTo(0, ship.r + 15);
        ctx.lineTo(8, ship.r);
        ctx.fill();
      }
      ctx.restore();
      
      if (!gameOver) gameLoop = requestAnimationFrame(game);
    }
    
    reset();
  </script>
</body>
</html>
